name: Ping Supabase
on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8AM UTC (4PM MYT)
  workflow_dispatch:       # Manual trigger option

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf "${{ secrets.SUPABASE_URL }}/rest/v1/waitlist?select=count&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o /dev/null -w "Ping status: %{http_code}\n"
